version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      - mongo
  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  mongo_data:
